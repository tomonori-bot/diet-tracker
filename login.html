<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0ea5e9">
<title>BodyLog ログイン</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f3f6f4;--surface:#fffdf8;--surface2:#f0ece1;
    --text:#1c1d1a;--text2:#6c6f66;--text3:#9a9c91;
    --border:rgba(28,29,26,.12);--accent:#0ea5e9;--accent2:#10b981;--danger:#ef4444;
    --shadow:0 4px 18px rgba(14,165,233,.12);
    --radius:14px;
  }
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;
    background:linear-gradient(135deg,#0ea5e9 0%,#38bdf8 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    padding-top:max(20px,env(safe-area-inset-top));
    padding-bottom:max(20px,env(safe-area-inset-bottom));
  }
  .card{
    background:var(--surface);
    border-radius:20px;
    padding:36px 28px;
    width:100%;max-width:380px;
    box-shadow:0 20px 60px rgba(0,0,0,.20);
    animation:slideUp .4s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{
    text-align:center;margin-bottom:24px;
  }
  .logo-icon{
    width:64px;height:64px;
    background:linear-gradient(135deg,#0ea5e9,#38bdf8);
    border-radius:18px;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:32px;
    margin-bottom:12px;
    box-shadow:0 8px 20px rgba(14,165,233,.30);
  }
  h1{
    font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;
  }
  .sub{
    font-size:13px;color:var(--text2);
  }
  .field{
    margin-bottom:14px;
  }
  label{
    display:block;font-size:12px;font-weight:600;color:var(--text2);
    margin-bottom:6px;
  }
  input{
    width:100%;
    border:1.5px solid var(--border);
    background:var(--surface2);
    border-radius:12px;
    padding:14px 16px;
    font-size:16px;
    color:var(--text);
    font-family:inherit;
    transition:.2s;
    -webkit-appearance:none;
    appearance:none;
  }
  input:focus{
    outline:none;
    border-color:var(--accent);
    background:#fff;
    box-shadow:0 0 0 4px rgba(14,165,233,.10);
  }
  .btn{
    width:100%;
    border:none;
    background:linear-gradient(135deg,#0ea5e9,#38bdf8);
    color:#fff;
    font-weight:700;
    font-size:16px;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    margin-top:8px;
    transition:.2s;
    font-family:inherit;
    box-shadow:0 6px 16px rgba(14,165,233,.30);
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(14,165,233,.40)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .err{
    background:#fef2f2;
    color:var(--danger);
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:12px;
    border:1px solid #fecaca;
    display:none;
  }
  .err.show{display:block}
  .info{
    text-align:center;
    font-size:12px;
    color:var(--text3);
    margin-top:20px;
    line-height:1.6;
  }
  .info b{color:var(--accent)}
  .remember{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:var(--text2);
    margin:6px 0 14px;cursor:pointer;
  }
  .remember input[type=checkbox]{
    width:20px;height:20px;margin:0;flex-shrink:0;
    -webkit-appearance:auto;appearance:auto;
    accent-color:var(--accent);cursor:pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <h1>BodyLog</h1>
      <div class="sub" id="subLabel">管理者ログイン</div>
    </div>

    <!-- ログイン / 新規登録 切り替えタブ -->
    <div style="display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:18px">
      <button type="button" id="tabLogin" onclick="switchMode('login')"
        style="flex:1;border:none;border-radius:9px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)">ログイン</button>
      <button type="button" id="tabRegister" onclick="switchMode('register')"
        style="flex:1;border:none;border-radius:9px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:none;color:var(--text2)">新規登録</button>
    </div>

    <div class="err" id="err"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username" id="idLabel">メールアドレス または ユーザー名</label>
        <input type="text" id="username" autocomplete="username" required autocapitalize="none" autocorrect="off" placeholder="登録したメールアドレス">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="6文字以上">
      </div>
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span>このデバイスでログイン状態を保持（30日間）</span>
      </label>
      <label class="remember" id="consentRow" style="display:none;align-items:flex-start;">
        <input type="checkbox" id="agree" style="margin-top:3px;">
        <span><a href="terms.html" target="_blank" style="color:var(--accent)">利用規約</a> および <a href="privacy.html" target="_blank" style="color:var(--accent)">プライバシーポリシー</a> に同意します</span>
      </label>
      <button type="submit" class="btn" id="loginBtn">ログイン</button>
    </form>

    <div class="info" id="infoText">
      PC・スマホ どちらからでもログインできます<br>
      同じデータがリアルタイムで共有されます 📱💻
    </div>
  </div>

<script>
// 既にログインしていれば admin.html へ
(async () => {
  const token = localStorage.getItem('bodylog_token') || sessionStorage.getItem('bodylog_token');
  if (!token) return;
  try {
    const r = await fetch('/api/auth/check', { headers:{ Authorization:'Bearer '+token } });
    const j = await r.json();
    if (j.authenticated) location.replace('admin.html');
  } catch {}
})();

const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
const btn = document.getElementById('loginBtn');

let mode = 'login'; // 'login' | 'register'

function switchMode(m) {
  mode = m;
  errEl.classList.remove('show');
  const tabLogin = document.getElementById('tabLogin');
  const tabReg = document.getElementById('tabRegister');
  const active = 'flex:1;border:none;border-radius:9px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)';
  const inactive = 'flex:1;border:none;border-radius:9px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:none;color:var(--text2)';
  const consentRow = document.getElementById('consentRow');
  if (m === 'login') {
    tabLogin.style.cssText = active; tabReg.style.cssText = inactive;
    document.getElementById('subLabel').textContent = '管理者ログイン';
    btn.textContent = 'ログイン';
    document.getElementById('password').autocomplete = 'current-password';
    document.getElementById('infoText').innerHTML = 'PC・スマホ どちらからでもログインできます<br>同じデータがリアルタイムで共有されます 📱💻';
    consentRow.style.display = 'none';
    // ログインはメール・ユーザー名どちらでも可
    document.getElementById('idLabel').textContent = 'メールアドレス または ユーザー名';
    const idIn = document.getElementById('username');
    idIn.type = 'text'; idIn.placeholder = '登録したメールアドレス';
  } else {
    tabReg.style.cssText = active; tabLogin.style.cssText = inactive;
    document.getElementById('subLabel').textContent = '新規アカウント登録';
    btn.textContent = '登録する';
    document.getElementById('password').autocomplete = 'new-password';
    document.getElementById('infoText').innerHTML = 'メールアドレスとパスワード（6文字以上）で登録します<br>登録したアカウントの患者データはあなただけが見られます 🔒';
    consentRow.style.display = 'flex';
    // 新規登録はメールアドレス
    document.getElementById('idLabel').textContent = 'メールアドレス';
    const idIn = document.getElementById('username');
    idIn.type = 'email'; idIn.placeholder = 'you@example.com';
  }
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  errEl.classList.remove('show');

  if (mode === 'register' && !document.getElementById('agree').checked) {
    errEl.textContent = '利用規約・プライバシーポリシーへの同意が必要です';
    errEl.classList.add('show');
    return;
  }

  const idValue = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  // 新規登録時はメールアドレスの形式チェック
  if (mode === 'register' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(idValue)) {
    errEl.textContent = 'メールアドレスの形式が正しくありません';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = mode === 'login' ? 'ログイン中...' : '登録中...';

  const remember = document.getElementById('remember').checked;
  const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
  // 登録はemail、ログインは識別子(username)として送る
  const payload = mode === 'register'
    ? { email: idValue, password }
    : { username: idValue, password };

  try {
    const res = await fetch(endpoint, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });
    const j = await res.json();
    if (!res.ok) throw new Error(j.error || (mode === 'login' ? 'ログインに失敗しました' : '登録に失敗しました'));

    if (remember) {
      localStorage.setItem('bodylog_token', j.token);
      localStorage.setItem('bodylog_user', j.username);
    } else {
      sessionStorage.setItem('bodylog_token', j.token);
      sessionStorage.setItem('bodylog_user', j.username);
    }
    location.replace('admin.html');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'ログイン' : '登録する';
  }
});
</script>
</body>
</html>
