<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#4a72f5">
<title>BodyLog ログイン</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f5f7fb;--surface:#fff;--surface2:#eef2fb;
    --text:#1a2238;--text2:#5a6580;--text3:#8b95ad;
    --border:#e1e7f5;--accent:#4a72f5;--accent2:#10b981;--danger:#ef4444;
    --shadow:0 4px 18px rgba(74,114,245,.10);
    --radius:14px;
  }
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,system-ui,sans-serif;
    background:linear-gradient(135deg,#4a72f5 0%,#7c5cff 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    padding-top:max(20px,env(safe-area-inset-top));
    padding-bottom:max(20px,env(safe-area-inset-bottom));
  }
  .card{
    background:var(--surface);
    border-radius:20px;
    padding:36px 28px;
    width:100%;max-width:380px;
    box-shadow:0 20px 60px rgba(0,0,0,.20);
    animation:slideUp .4s ease;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{
    text-align:center;margin-bottom:24px;
  }
  .logo-icon{
    width:64px;height:64px;
    background:linear-gradient(135deg,#4a72f5,#7c5cff);
    border-radius:18px;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:32px;
    margin-bottom:12px;
    box-shadow:0 8px 20px rgba(74,114,245,.30);
  }
  h1{
    font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;
  }
  .sub{
    font-size:13px;color:var(--text2);
  }
  .field{
    margin-bottom:14px;
  }
  label{
    display:block;font-size:12px;font-weight:600;color:var(--text2);
    margin-bottom:6px;
  }
  input{
    width:100%;
    border:1.5px solid var(--border);
    background:#fafbff;
    border-radius:12px;
    padding:14px 16px;
    font-size:16px;
    color:var(--text);
    font-family:inherit;
    transition:.2s;
    -webkit-appearance:none;
    appearance:none;
  }
  input:focus{
    outline:none;
    border-color:var(--accent);
    background:#fff;
    box-shadow:0 0 0 4px rgba(74,114,245,.08);
  }
  .btn{
    width:100%;
    border:none;
    background:linear-gradient(135deg,#4a72f5,#7c5cff);
    color:#fff;
    font-weight:700;
    font-size:16px;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    margin-top:8px;
    transition:.2s;
    font-family:inherit;
    box-shadow:0 6px 16px rgba(74,114,245,.30);
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(74,114,245,.40)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .err{
    background:#fef2f2;
    color:var(--danger);
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:12px;
    border:1px solid #fecaca;
    display:none;
  }
  .err.show{display:block}
  .info{
    text-align:center;
    font-size:12px;
    color:var(--text3);
    margin-top:20px;
    line-height:1.6;
  }
  .info b{color:var(--accent)}
  .remember{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:var(--text2);
    margin:6px 0 14px;cursor:pointer;
  }
  .remember input{width:auto;margin:0}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📊</div>
      <h1>BodyLog</h1>
      <div class="sub">管理者ログイン</div>
    </div>

    <div class="err" id="err"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">ユーザー名</label>
        <input type="text" id="username" autocomplete="username" required autocapitalize="none" autocorrect="off">
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span>このデバイスでログイン状態を保持（30日間）</span>
      </label>
      <button type="submit" class="btn" id="loginBtn">ログイン</button>
    </form>

    <div class="info">
      PC・スマホ どちらからでもログインできます<br>
      同じデータがリアルタイムで共有されます 📱💻
    </div>
  </div>

<script>
// 既にログインしていれば admin.html へ
(async () => {
  const token = localStorage.getItem('bodylog_token') || sessionStorage.getItem('bodylog_token');
  if (!token) return;
  try {
    const r = await fetch('/api/auth/check', { headers:{ Authorization:'Bearer '+token } });
    const j = await r.json();
    if (j.authenticated) location.replace('admin.html');
  } catch {}
})();

const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
const btn = document.getElementById('loginBtn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;

  try {
    const res = await fetch('/api/auth/login', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ username, password })
    });
    const j = await res.json();
    if (!res.ok) throw new Error(j.error || 'ログインに失敗しました');

    if (remember) {
      localStorage.setItem('bodylog_token', j.token);
      localStorage.setItem('bodylog_user', j.username);
    } else {
      sessionStorage.setItem('bodylog_token', j.token);
      sessionStorage.setItem('bodylog_user', j.username);
    }
    location.replace('admin.html');
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
});
</script>
</body>
</html>
